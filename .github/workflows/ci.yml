name: CI — PrevencionApp

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint + type check + tests ──────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Train dummy model (needed for e2e tests)
        run: python ../scripts/train_dummy_model.py

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Format check (ruff)
        run: ruff format --check app/ tests/

      - name: Type check (mypy)
        run: mypy app/ --ignore-missing-imports

      - name: Unit tests
        run: pytest tests/unit/ -v --tb=short --cov=app --cov-report=xml

      - name: Integration tests
        run: pytest tests/integration/ -v --tb=short
        env:
          SUPABASE_URL: https://fake.supabase.co
          SUPABASE_ANON_KEY: fake_anon_key
          SUPABASE_SERVICE_KEY: fake_service_key
          SUPABASE_JWT_SECRET: fake_jwt_secret_32_chars_minimum_x

      - name: E2E tests
        run: pytest tests/e2e/ -v --tb=short
        env:
          SUPABASE_URL: https://fake.supabase.co
          SUPABASE_ANON_KEY: fake_anon_key
          SUPABASE_SERVICE_KEY: fake_service_key
          SUPABASE_JWT_SECRET: fake_jwt_secret_32_chars_minimum_x

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend

  # ── Frontend: lint + build ───────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check / build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://fake.supabase.co
          VITE_SUPABASE_ANON_KEY: fake_anon_key
          VITE_API_BASE_URL: http://localhost:8080

  # ── Security scan (Bandit + pip-audit) ───────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install bandit pip-audit
      - name: Bandit SAST
        run: bandit -r app/ -ll --exclude app/infrastructure/ml/sklearn_adapter.py
      - name: pip-audit (known CVEs)
        run: pip-audit --requirement <(pip freeze)

  # ── Docker build validation ───────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
          tags: prevencion-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
